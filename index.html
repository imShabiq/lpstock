<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwQ3Rxu3tWHc32frFnxEU2cacO-UBD3mY",
    authDomain: "lpstock-64b30.firebaseapp.com",
    projectId: "lpstock-64b30",
    storageBucket: "lpstock-64b30.firebasestorage.app",
    messagingSenderId: "211015665227",
    appId: "1:211015665227:web:7c31ee21dee2c580916fce",
    measurementId: "G-RYCTDZ2Y5L"
  };

  const SHOP_EMAIL = "shop@laundroplus.local";

  const firebaseApp = initializeApp(firebaseConfig);
  window.db = getFirestore(firebaseApp);
  window.firestoreFns = { collection, addDoc, getDocs, query, orderBy, serverTimestamp };

  const auth = getAuth(firebaseApp);
  window.shopAuth = {
    signIn: (password) => signInWithEmailAndPassword(auth, SHOP_EMAIL, password),
    signOut: () => signOut(auth)
  };

  window.firebaseReady = new Promise((resolve) => {
    onAuthStateChanged(auth, (user) => {
      if (user && user.isAnonymous) {
        signOut(auth);
        return;
      }
      window.dispatchEvent(new CustomEvent("auth-changed", { detail: { signedIn: !!user } }));
      if (user) resolve();
    });
  });
</script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #ECF0F1;
    color: #2C3E50;
  }

    align-items: center;

  }

  .brand .logo {
    width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);

    font-size: 16px;

  .back-row { margin-bottom: 10px; }
  .footer-bar {

  .modal-body { overflow-y: auto; padding: 10px 16px 16px; }
</style>

<script>
let items = {};
let order = [];
let stream = null;
let scanning = false;
let facingMode = "environment";
let lastScan = { code: null, time: 0 };
let batchLocation = null;
let batchUser = null;
let batchStartTime = null;

const STATE_KEY = "lpScannerState";
const BATCHES_KEY = "lpScannerBatches";
const LAST_LOCATION_KEY = "lpScannerLastLocation";
const LAST_USER_KEY = "lpScannerLastUser";

function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({ items, order, batchLocation, batchUser, batchStartTime }));
  } catch (err) { /* storage unavailable/full — current session still works in memory */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    items = parsed.items || {};
    order = parsed.order || [];
    batchLocation = parsed.batchLocation || null;
    batchUser = parsed.batchUser || null;
    batchStartTime = parsed.batchStartTime || null;
  } catch (err) { /* ignore corrupt/missing saved state */ }
}

function loadBatches() {
  try {
    const raw = localStorage.getItem(BATCHES_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (err) {
    return [];
  }
}

function saveBatch(batch) {
  try {
    const batches = loadBatches();
    batches.push(batch);
    localStorage.setItem(BATCHES_KEY, JSON.stringify(batches));
  } catch (err) { /* storage unavailable/full — batch not saved */ }
}

async function saveBatchToCloud(batch) {
  try {
    await window.firebaseReady;
    if (!window.db) return;
    const { collection, addDoc, serverTimestamp } = window.firestoreFns;
    await addDoc(collection(window.db, "batches"), { ...batch, syncedAt: serverTimestamp() });
  } catch (err) {
    console.error("Cloud sync failed, batch is still saved on this device:", err);
  }
}

async function loadCloudBatches() {
  try {
    await window.firebaseReady;
    if (!window.db) return [];
    const { collection, getDocs, query, orderBy } = window.firestoreFns;
    const q = query(collection(window.db, "batches"), orderBy("endTime"));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ ...d.data(), _docId: d.id }));
  } catch (err) {
    console.error("Failed to load cloud batches:", err);
    return [];
  }
}

async function getAllBatches() {
  const localBatches = loadBatches();
  const cloudBatches = await loadCloudBatches();
  const localIds = new Set(localBatches.map(b => String(b.id)));
  const merged = localBatches.concat(cloudBatches.filter(b => !localIds.has(String(b.id))));
  merged.sort((a, b) => new Date(a.endTime) - new Date(b.endTime));
  return merged;
}

const video = document.getElementById("video");
const decodeCanvas = document.createElement("canvas");
const dctx = decodeCanvas.getContext("2d", { willReadFrequently: true });
const MAX_DECODE_DIM = 480;
const statusLine = document.getElementById("statusLine");
const startBtn = document.getElementById("startBtn");
const switchBtn = document.getElementById("switchBtn");
const listBody = document.getElementById("listBody");
const locationInput = document.getElementById("locationInput");
const userInput = document.getElementById("userInput");

function lockBatchInputs(locked) {
  locationInput.disabled = locked;
  userInput.disabled = locked;
}

function renderList() {
  document.getElementById("itemCount").textContent = order.length + " items";
  document.getElementById("statUnique").textContent = order.length;
  const total = order.reduce((s, c) => s + items[c].qty, 0);
  document.getElementById("statTotal").textContent = total;

  if (order.length === 0) {
    listBody.innerHTML = '<div class="empty-state">Nothing scanned yet</div>';
    return;
  }
  listBody.innerHTML = order.slice().reverse().map(code => {
    const it = items[code];
    return `<div class="ticket">
      <div>
        <div class="code">${escapeHtml(code)}</div>
        <div class="meta">first: ${it.first} · last: ${it.last}</div>
      </div>
      <div class="qty-wrap">
        <button class="qty-btn" data-code="${escapeHtml(code)}" data-delta="-1">-</button>
        <div class="qty">${it.qty}</div>
        <button class="qty-btn" data-code="${escapeHtml(code)}" data-delta="1">+</button>
      </div>
    </div>`;
  }).join("");
}

listBody.addEventListener("click", (e) => {
  const btn = e.target.closest(".qty-btn");
  if (!btn) return;
  changeQty(btn.dataset.code, Number(btn.dataset.delta));
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function changeQty(code, delta) {
  if (!items[code]) return;
  items[code].qty = Math.max(1, items[code].qty + delta);
  renderList();
  saveState();
}

function addScan(code) {
  code = code.trim();
  if (!code) return;
  if (order.length === 0) {
    batchLocation = locationInput.value.trim() || "(no location)";
    batchUser = userInput.value.trim() || "(unknown)";
    batchStartTime = new Date().toISOString();
    lockBatchInputs(true);
  }
  const now = new Date();
  const timeStr = now.toLocaleTimeString();
  if (items[code]) {
    items[code].qty += 1;
    items[code].last = timeStr;
  } else {
    items[code] = { qty: 1, first: timeStr, last: timeStr };
    order.push(code);
  }
  renderList();
  saveState();
  flashStatus(`Scanned: ${code} (qty ${items[code].qty})`);
}

function flashStatus(msg) {
  statusLine.textContent = msg;
  statusLine.classList.add("flash");
  setTimeout(() => statusLine.classList.remove("flash"), 350);
  if (navigator.vibrate) navigator.vibrate(60);
}

let starting = false;
let barcodeDetector = null;

async function initDetector() {
  if (!("BarcodeDetector" in window)) return;
  try {
    const formats = await BarcodeDetector.getSupportedFormats();
    if (formats.includes("qr_code")) {
      barcodeDetector = new BarcodeDetector({ formats: ["qr_code"] });
    }
  } catch (err) {
    barcodeDetector = null;
  }
}
initDetector();

function handleDetectedCode(data) {
  const now = Date.now();
  if (data !== lastScan.code || now - lastScan.time > 1500) {
    lastScan = { code: data, time: now };
    addScan(data);
  }
}

async function startCamera() {
  if (starting) return;
  starting = true;
  startBtn.disabled = true;
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    switchBtn.style.display = "inline-block";
    startBtn.textContent = "Restart camera";
    statusLine.textContent = "Scanning… hold a QR code in frame";
    if (!scanning) {
      scanning = true;
      requestAnimationFrame(scanLoop);
    }
  } catch (err) {
    statusLine.textContent = "Camera error: " + err.message + " — you can still use manual entry below.";
  } finally {
    starting = false;
    startBtn.disabled = false;
  }
}

let detecting = false;

async function scanLoop() {
  if (!scanning) return;
  if (!detecting) {
    detecting = true;
    try {
      if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth) {
        if (barcodeDetector) {
          const codes = await barcodeDetector.detect(video);
          if (codes.length > 0) handleDetectedCode(codes[0].rawValue);
        } else {
          if (typeof jsQR !== "function") {
            throw new Error("QR library failed to load — reload the page");
          }
          const scale = Math.min(1, MAX_DECODE_DIM / Math.max(video.videoWidth, video.videoHeight));
          const w = Math.round(video.videoWidth * scale);
          const h = Math.round(video.videoHeight * scale);
          if (decodeCanvas.width !== w || decodeCanvas.height !== h) {
            decodeCanvas.width = w;
            decodeCanvas.height = h;
          }
          dctx.drawImage(video, 0, 0, w, h);
          const imgData = dctx.getImageData(0, 0, w, h);
          const code = jsQR(imgData.data, w, h, { inversionAttempts: "dontInvert" });
          if (code && code.data) handleDetectedCode(code.data);
        }
      }
    } catch (err) {
      statusLine.textContent = "Scan error: " + err.message;
    }
    detecting = false;
  }
  requestAnimationFrame(scanLoop);
}

startBtn.addEventListener("click", startCamera);
switchBtn.addEventListener("click", () => {
  facingMode = facingMode === "environment" ? "user" : "environment";
  startCamera();
});

document.getElementById("manualAdd").addEventListener("click", () => {
  const inp = document.getElementById("manualInput");
  if (inp.value.trim()) { addScan(inp.value); inp.value = ""; }
});
document.getElementById("manualInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("manualAdd").click();
});

const historyBtn = document.getElementById("historyBtn");
const historyModal = document.getElementById("historyModal");
const historyList = document.getElementById("historyList");
const historyTitle = document.getElementById("historyTitle");
const closeHistoryBtn = document.getElementById("closeHistoryBtn");

let batchListCache = [];

async function renderBatchList() {
  historyTitle.textContent = "Batch history";
  historyList.innerHTML = '<div class="empty-state">Loading…</div>';
  const batches = await getAllBatches();
  batchListCache = batches;
  if (batches.length === 0) {
    historyList.innerHTML = '<div class="empty-state">No finished batches yet</div>';
    return;
  }
  historyList.innerHTML = batches.slice().reverse().map(b => {
    const qty = b.order.reduce((s, c) => s + b.items[c].qty, 0);
    return `<div class="batch-card" data-batch-id="${escapeHtml(String(b.id))}">
      <div class="batch-loc">${escapeHtml(b.location)}</div>
      <div class="batch-meta">${escapeHtml(b.user)} · ${escapeHtml(new Date(b.endTime).toLocaleString())}</div>
      <div class="batch-count">${b.order.length} code(s) · ${qty} total qty</div>
    </div>`;
  }).join("");
}

function viewBatch(batchId) {
  const batch = batchListCache.find(b => String(b.id) === String(batchId));
  if (!batch) return;
  historyTitle.textContent = batch.location;
  const rows = batch.order.map(code => {
    const it = batch.items[code];
    return `<div class="ticket">
      <div>
        <div class="code">${escapeHtml(code)}</div>
        <div class="meta">first: ${escapeHtml(it.first)} · last: ${escapeHtml(it.last)}</div>
      </div>
      <div class="qty">${it.qty}</div>
    </div>`;
  }).join("");
  historyList.innerHTML = `
    <div class="back-row" style="display:flex; gap:8px;">
      <button class="btn-secondary" data-action="back">&larr; All batches</button>
      <button class="btn-primary" style="flex:1;" data-action="download-batch" data-batch-id="${escapeHtml(String(batch.id))}">Download Excel</button>
    </div>
    <div class="list-header">${escapeHtml(batch.user)} · ${escapeHtml(new Date(batch.endTime).toLocaleString())}</div>
    ${rows}
  `;
}

historyList.addEventListener("click", (e) => {
  const card = e.target.closest(".batch-card");
  if (card) { viewBatch(card.dataset.batchId); return; }
  const action = e.target.closest("[data-action]");
  if (!action) return;
  if (action.dataset.action === "back") renderBatchList();
  else if (action.dataset.action === "download-batch") downloadBatchExcel(action.dataset.batchId);
});

function downloadBatchExcel(batchId) {
  const batch = batchListCache.find(b => String(b.id) === String(batchId));
  if (!batch) return;
  const rows = batch.order.map((code, i) => ({
    "#": i + 1,
    "Location": batch.location,
    "Scanned By": batch.user,
    "QR Code": code,
    "Quantity": batch.items[code].qty,
    "First Scanned": batch.items[code].first,
    "Last Scanned": batch.items[code].last
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [{ wch: 5 }, { wch: 18 }, { wch: 18 }, { wch: 40 }, { wch: 10 }, { wch: 14 }, { wch: 14 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Batch");
  const stamp = new Date(batch.endTime).toISOString().slice(0, 19).replace(/[:T]/g, "-");
  const safeLoc = batch.location.replace(/[^a-z0-9]+/gi, "-").slice(0, 30);
  XLSX.writeFile(wb, `laundry-batch-${safeLoc}-${stamp}.xlsx`);
}

historyBtn.addEventListener("click", () => {
  historyModal.style.display = "flex";
  renderBatchList();
});
closeHistoryBtn.addEventListener("click", () => {
  historyModal.style.display = "none";
});

document.getElementById("clearBtn").addEventListener("click", () => {
  if (order.length === 0) { flashStatus("Nothing scanned yet to finish"); return; }
  if (!confirm(`Finish this batch (${order.length} code(s)) and save it to history?`)) return;
  const batch = {
    id: Date.now(),
    location: batchLocation || "(no location)",
    user: batchUser || "(unknown)",
    startTime: batchStartTime,
    endTime: new Date().toISOString(),
    items, order
  };
  saveBatch(batch);
  saveBatchToCloud(batch);
  try {
    localStorage.setItem(LAST_LOCATION_KEY, batch.location);
    localStorage.setItem(LAST_USER_KEY, batch.user);
  } catch (err) { /* ignore */ }
  items = {}; order = []; batchLocation = null; batchUser = null; batchStartTime = null;
  lockBatchInputs(false);
  renderList();
  saveState();
  flashStatus("Batch saved to history");
});

document.getElementById("exportBtn").addEventListener("click", async () => {
  if (order.length === 0) { flashStatus("Nothing to export yet"); return; }
  const currentLocation = batchLocation || locationInput.value.trim() || "(no location)";
  const currentUser = batchUser || userInput.value.trim() || "(unknown)";
  const rows = order.map((code, i) => ({
    "#": i + 1,
    "Location": currentLocation,
    "Scanned By": currentUser,
    "QR Code": code,
    "Quantity": items[code].qty,
    "First Scanned": items[code].first,
    "Last Scanned": items[code].last
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [{ wch: 5 }, { wch: 18 }, { wch: 18 }, { wch: 40 }, { wch: 10 }, { wch: 14 }, { wch: 14 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Current Batch");

  const batches = await getAllBatches();
  if (batches.length) {
    const batchRows = [];
    batches.forEach((b, bi) => {
      b.order.forEach(code => {
        const it = b.items[code];
        batchRows.push({
          "Batch #": bi + 1,
          "Date": new Date(b.endTime).toLocaleString(),
          "Location": b.location,
          "Scanned By": b.user,
          "QR Code": code,
          "Quantity": it.qty,
          "First Scanned": it.first,
          "Last Scanned": it.last
        });
      });
    });
    const wsBatches = XLSX.utils.json_to_sheet(batchRows);
    wsBatches["!cols"] = [{ wch: 8 }, { wch: 20 }, { wch: 18 }, { wch: 18 }, { wch: 40 }, { wch: 10 }, { wch: 14 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, wsBatches, "Batch History");
  }

  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g, "-");
  XLSX.writeFile(wb, `laundry-stock-${stamp}.xlsx`);
});

loadState();
if (order.length) {
  locationInput.value = batchLocation || "";
  userInput.value = batchUser || "";
  lockBatchInputs(true);
  flashStatus(`Restored ${order.length} item(s) from your last session`);
} else {
  try {
    locationInput.value = localStorage.getItem(LAST_LOCATION_KEY) || "";
    userInput.value = localStorage.getItem(LAST_USER_KEY) || "";
  } catch (err) { /* ignore */ }
}
renderList();

const lockScreen = document.getElementById("lockScreen");
const appRoot = document.getElementById("appRoot");
const lockPasswordInput = document.getElementById("lockPasswordInput");
const lockUnlockBtn = document.getElementById("lockUnlockBtn");
const lockError = document.getElementById("lockError");

window.addEventListener("auth-changed", (e) => {
  if (e.detail.signedIn) {
    lockScreen.style.display = "none";
    appRoot.style.display = "block";
  } else {
    lockScreen.style.display = "flex";
    appRoot.style.display = "none";
  }
});

async function tryUnlock() {
  const pw = lockPasswordInput.value;
  if (!pw) return;
  lockUnlockBtn.disabled = true;
  lockError.textContent = "";
  try {
    await window.shopAuth.signIn(pw);
    lockPasswordInput.value = "";
  } catch (err) {
    lockError.textContent = "Incorrect password — try again";
  } finally {
    lockUnlockBtn.disabled = false;
  }
}
lockUnlockBtn.addEventListener("click", tryUnlock);
lockPasswordInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

document.getElementById("lockBtn").addEventListener("click", () => {
  window.shopAuth.signOut();
});
</script>
</body>
</html>
